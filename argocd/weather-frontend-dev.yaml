apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weather-frontend-dev
  namespace: argocd
spec:
  project: default
  destination:
    namespace: weather-dev
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/henria/gitops-application.git
    targetRevision: main
    path: charts/weather-frontend
    helm:
      valueFiles:
        - values-dev.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
