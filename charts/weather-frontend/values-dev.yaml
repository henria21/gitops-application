image:
  repository: henria/weather_app_frontend
  tag: "latest"   # auto-updated by GitHub Actions on each push to main
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 5001

env:
  - name: BACKEND_URL
    value: "http://weather-backend-weather-backend:80"
  - name: FLASK_ENV
    value: development
