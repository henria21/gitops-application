apiVersion: v1
kind: Service
metadata:
  name: {{ include "weather-backend.fullname" . }}
  labels:
    {{- include "weather-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "weather-backend.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
